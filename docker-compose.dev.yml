# Development overlay.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Phase 0 keeps this minimal — it just exposes the backend service ports to
# the host so developers can connect with local tools (psql, redis-cli, the
# MinIO console). Source-mounting + hot reload (air for Go, next dev for the
# dashboard) lands in Phase 1 once there is actual code to iterate on.

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  minio:
    ports:
      # The base compose already publishes 9000; this overlay adds the
      # console (9001) for local browsing.
      - "9001:9001"

  worker:
    ports:
      # Phase 5: publish the worker's Prometheus /metrics listener so a
      # local Prometheus / curl can scrape oas_worker_* without
      # docker-execing into the container.
      - "9100:9100"
