run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - gofmt
    - goimports
    - staticcheck
    - revive
    - ineffassign
    - unused
    - gosimple
    - typecheck

linters-settings:
  goimports:
    local-prefixes: github.com/eliau2005/openadsource/server
  revive:
    rules:
      - name: var-naming
      - name: package-comments
        disabled: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
