name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: server (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: server/go.sum

      - name: Install xmllint (libxml2-utils)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libxml2-utils

      - name: Download modules
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60
          working-directory: server
          # --go=1.23 pins the language-version target so golangci-lint v1.x
          # (built with Go 1.23) doesn't refuse our Go 1.25 source. Our code
          # doesn't use 1.24/1.25-only syntax features, so 1.23 static analysis
          # is correct. Drop this once we migrate to golangci-lint v2.x.
          args: --timeout=5m --go=1.23

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -race -count=1

  dashboard:
    name: dashboard (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # next build evaluates server modules to collect page data, which
          # trips the Zod env validator. Supply CI-only placeholders so the
          # validator passes; real deployments set these from .env. Values
          # don't need to resolve to anything reachable.
          DATABASE_URL: "postgres://placeholder:placeholder@localhost:5432/placeholder"
          JWT_SECRET: "ci-placeholder-value"

  docker:
    name: docker images build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: adserver
            context: ./server
          - name: dashboard
            context: ./dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
