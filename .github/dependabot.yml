version: 2
updates:
  - package-ecosystem: gomod
    directory: /server
    schedule: { interval: weekly }
    groups:
      all:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /dashboard
    schedule: { interval: weekly }
    groups:
      all:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /server
    schedule: { interval: monthly }

  - package-ecosystem: docker
    directory: /dashboard
    schedule: { interval: monthly }

  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
